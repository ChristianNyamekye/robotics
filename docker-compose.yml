services:
  ros:
    build: .
    command: tail -f /dev/null
    volumes: 
      - ./workspace:/root/catkin_ws/
    environment:
      - DISPLAY=novnc:0.0
    env_file:
      - ros.env
    networks:
      - x11
  novnc:  
    image: theasp/novnc:latest
    env_file:
      - novnc.env
    ports:
      - "8080:8080"
    networks:
      - x11
  rosbot:
    image: husarion/rosbot-gazebo:humble
    container_name: rosbot-gazebo
    depends_on:
      - novnc
    environment:
      - DISPLAY=novnc:0.0
    command: ros2 launch rosbot_gazebo simulation.launch.py mecanum:=${MECANUM:-False}
    networks:
      - x11
networks:
  x11:
